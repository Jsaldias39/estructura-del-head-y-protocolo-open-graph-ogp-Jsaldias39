<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicio Tecnico Samsung</title>
    <!-- Etiquetas Open Graph para compartir en redes sociales -->
    <meta property="og:title" content="Servicio Tecnico Samsung">
    <meta property="og:description" content="Soporte y reparación Samsung y demas">
    <meta property="og:image" content="https://samsung.com.bo/assets/img/landings/combo-s26/1.png">
    <meta property="og:url" content="https://jsaldias39.github.io/estructura-del-head-y-protocolo-open-graph-ogp-Jsaldias39/samsung.html">
    <meta property="og:type" content="website">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            background: linear-gradient(120deg, #0f0f10 0%, #2f343a 45%, #17191d 100%);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        main {
            margin-top: 8vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
            padding: 0 1rem;
        }

        h1 {
            margin: 0;
            color: #f2f2f2;
            font-size: clamp(2rem, 7vw, 4.2rem);
            font-weight: 700;
            text-align: center;
            letter-spacing: 0.02em;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
        }

        .samsung-image {
            width: min(420px, 90vw);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.4);
            display: block;
        }
    </style>
</head>
<body>
    <main>
        <h1>Servicio Tecnico Samsung</h1>
        <img
            class="samsung-image"
            src="https://www.enter.co/wp-content/uploads/2025/09/WhatsApp-Image-2025-09-07-at-11.21.14-PM-1104x621.jpeg"
            alt="Dispositivo Samsung"
        >
    </main>
</body>
</html>
